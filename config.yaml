# ------------------------------------------------------------
# Title matching
# ------------------------------------------------------------
# A job is included if its title matches at least one
# role keyword AND does not match any exclude keyword.
# If require_new_grad_signal is true, the title must ALSO contain a
# new-grad signal — set false to see all matching roles regardless of
# level wording.

role_keywords:
    - software engineer
    - swe
    - machine learning
    - ml engineer
    - applied ai
    - applied scientist
    - ai engineer
    - forward deployed
    - fde
    - research engineer
    - deployment engineer
    - solutions engineer
    - data scientist

new_grad_keywords:
    - new grad
    - new graduate
    - university grad
    - early career
    - entry level
    - "2026"
    - campus
    - junior
    - associate

exclude_keywords:
    - senior
    - staff
    - principal
    - lead
    - manager
    - director
    - intern # remove this line if you also want internships
    - sr.
    - sr "
    - head of
    - vp

require_new_grad_signal: false # set true once volume gets noisy

# Only keep US-based (or remote-US) roles
us_only: true

# ------------------------------------------------------------
# SimplifyJobs community feed (covers Big Tech / Workday companies)
# Source: github.com/SimplifyJobs/New-Grad-Positions
# Already new-grad curated, so role keywords are NOT applied —
# instead we filter by their category field. exclude_keywords
# still apply.
# ------------------------------------------------------------
simplifyjobs:
    enabled: true
    categories: # options seen in feed: Software, AI/ML/Data,
        - Software # Hardware, Quant, Product
        - AI/ML/Data
    max_age_days: 7 # only surface posts from the last N days
    skip_citizenship_required: true # drop "U.S. Citizenship is Required" roles
