# ============================================================
# Job Alert Config
# ============================================================
# Companies are grouped by which ATS (applicant tracking system)
# they use, because each ATS has a different public API.
#
# To find a company's board slug:
#   Greenhouse: job page URL looks like boards.greenhouse.io/<slug>
#               or job-boards.greenhouse.io/<slug>
#   Lever:      jobs.lever.co/<slug>
#   Ashby:      jobs.ashbyhq.com/<slug>
#
# Just add/remove slugs below — no code changes needed.

